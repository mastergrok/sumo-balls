<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SUMO BALLS</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Boogaloo&family=Zen+Dots&family=Nunito:wght@700;900&display=swap');
:root {
  --bg:#0d0a08; --card:#12100a; --gold:#f5c842; --red:#e03030;
  --green:#2ecc8a; --text:#f0e8d0; --muted:#7a6a50;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;
}
body{
  display:flex;flex-direction:column;align-items:stretch;
  background-image:
    radial-gradient(ellipse 80% 50% at 50% 0%,rgba(180,120,20,.18) 0%,transparent 70%),
    repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(255,255,255,.012) 40px,rgba(255,255,255,.012) 41px),
    repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(255,255,255,.012) 40px,rgba(255,255,255,.012) 41px);
}

/* ── HEADER — compact */
.header{text-align:center;padding:6px 0 2px;flex-shrink:0;}
h1{
  font-family:'Zen Dots',cursive;font-size:clamp(.9rem,4vw,1.6rem);letter-spacing:3px;
  color:var(--gold);text-shadow:0 0 20px rgba(245,200,66,.5),0 2px 0 #8a6010;
  text-transform:uppercase;line-height:1;
}
.subtitle{font-size:.52rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}

/* ── MAIN: two columns on wide, single column on narrow */
.game-wrap{
  display:flex;flex:1;min-height:0;gap:8px;padding:6px 8px 8px;
  align-items:stretch;justify-content:center;
}

/* Wide layout: arena left, sidebar right */
.arena-section{display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0;}
.arena-frame{position:relative;flex-shrink:0;}
#threeCanvas{display:block;}
.cdbar-wrap{width:100%;height:5px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;}
#cdBar{height:100%;background:var(--gold);border-radius:3px;width:100%;transition:width 1s linear,background .3s;}
.phase-pill{font-family:'Boogaloo',cursive;font-size:clamp(.7rem,2vw,.9rem);letter-spacing:1px;padding:4px 14px;border-radius:30px;text-transform:uppercase;transition:all .3s;}
.pill-bet{background:rgba(245,200,66,.12);color:var(--gold);border:1px solid rgba(245,200,66,.3);}
.pill-fight{background:rgba(224,48,48,.15);color:var(--red);border:1px solid rgba(224,48,48,.4);animation:blink .7s infinite;}
.pill-win{background:rgba(46,204,138,.13);color:var(--green);border:1px solid rgba(46,204,138,.3);}
.pill-lose{background:rgba(224,48,48,.13);color:var(--red);border:1px solid rgba(224,48,48,.3);}
.pill-none{background:rgba(120,100,70,.15);color:var(--muted);border:1px solid rgba(120,100,70,.25);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.55}}

.sidebar{display:flex;flex-direction:column;gap:6px;overflow-y:auto;flex-shrink:0;}
.card{background:var(--card);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:8px 10px;}
.clabel{font-size:.52rem;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:5px;}
.bankroll-num{font-family:'Zen Dots',cursive;font-size:clamp(1.1rem,3vw,1.7rem);color:var(--gold);text-shadow:0 0 14px rgba(245,200,66,.35);line-height:1;}
.round-row{display:flex;justify-content:space-between;align-items:center;margin-top:5px;font-size:.62rem;color:var(--muted);}
.hist-dots{display:flex;gap:3px;flex-wrap:wrap;}
.hdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.fighters{display:flex;gap:5px;}
.fcard{
  flex:1;background:rgba(255,255,255,.03);border:2px solid rgba(255,255,255,.08);
  border-radius:9px;padding:6px 4px 5px;text-align:center;cursor:pointer;
  transition:all .22s;user-select:none;position:relative;
}
.fcard:hover{background:rgba(255,255,255,.07);border-color:rgba(245,200,66,.4);}
.fcard.picked{
  border-color:var(--gold);background:rgba(245,200,66,.18);
  box-shadow:0 0 0 2px rgba(245,200,66,.5),0 0 16px rgba(245,200,66,.4);
  transform:translateY(-1px);
}
.fcard.picked::after{
  content:'✓';position:absolute;top:3px;right:5px;
  font-size:.72rem;color:var(--gold);font-weight:900;
}
.fcard.locked-loser{pointer-events:none;opacity:.32;filter:grayscale(60%);}
.fcard.locked-winner{pointer-events:none;}
.fcard canvas{display:block;margin:0 auto 3px;}
.fname{font-family:'Boogaloo',cursive;font-size:.75rem;margin-bottom:1px;color:var(--text);}
.fodds{font-size:.60rem;color:var(--green);font-weight:900;}
.fmystery{font-size:.52rem;color:var(--muted);}
.bet-live{
  display:none;background:rgba(245,200,66,.10);border:1px solid rgba(245,200,66,.25);
  border-radius:8px;padding:6px 10px;text-align:center;
}
.bet-live-label{font-size:.52rem;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:2px;}
.bet-live-amount{font-family:'Zen Dots',cursive;font-size:1.1rem;color:var(--gold);}
.bet-live-on{font-size:.60rem;color:var(--muted);margin-top:1px;}
.bet-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:5px;}
.bet-input{
  grid-column:1/-1;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
  border-radius:7px;color:var(--text);font-family:'Nunito',sans-serif;font-size:.9rem;
  font-weight:700;padding:5px 9px;outline:none;width:100%;
}
.bet-input:focus{border-color:var(--gold);}
.qb{
  background:rgba(255,255,255,.06);border:none;color:#bba;border-radius:6px;
  padding:4px 0;font-size:.62rem;font-weight:900;cursor:pointer;transition:all .15s;
  font-family:'Nunito',sans-serif;
}
.qb:hover{background:var(--red);color:#fff;}
.main-btn{width:100%;padding:9px;border-radius:9px;border:none;font-family:'Boogaloo',cursive;font-size:.95rem;letter-spacing:2px;cursor:pointer;transition:all .2s;text-transform:uppercase;}
.main-btn.go{background:linear-gradient(135deg,#e03030,#a01818);color:#fff;box-shadow:0 3px 16px rgba(224,48,48,.4);}
.main-btn.go:hover{transform:translateY(-1px);}
.main-btn.go:disabled{opacity:.35;transform:none;cursor:not-allowed;}
.main-btn.next{background:linear-gradient(135deg,#2ecc8a,#189a5e);color:#0a1a10;box-shadow:0 3px 14px rgba(46,204,138,.3);}
.result-msg{font-family:'Boogaloo',cursive;font-size:1.1rem;text-align:center;min-height:26px;letter-spacing:1px;}
.r-win{color:var(--green);} .r-lose{color:var(--red);} .r-skip{color:var(--muted);}
</style>
</head>
<body>
<div class="header">
  <h1>⚡ Sumo Balls ⚡</h1>
  <p class="subtitle">bet wisely — the house always smiles</p>
</div>
<div class="game-wrap">
  <div class="arena-section">
    <div class="arena-frame">
      <canvas id="threeCanvas" width="380" height="380"></canvas>
    </div>
    <div class="phase-pill pill-bet" id="pill">💰 Place Your Bet</div>
    <div class="cdbar-wrap"><div id="cdBar"></div></div>
  </div>
  <div class="sidebar">
    <div class="card">
      <div class="clabel">💴 Bankroll</div>
      <div class="bankroll-num" id="bankroll">$100</div>
      <div class="round-row">
        <span>Round <strong id="roundNum">1</strong></span>
        <div class="hist-dots" id="histDots"></div>
      </div>
    </div>
    <div class="card">
      <div class="clabel">🥋 Fighters</div>
      <div class="fighters">
        <div class="fcard" id="fc0" onclick="pickBall(0)">
          <canvas id="prev0" width="70" height="80"></canvas>
          <div class="fname" id="fn0">—</div>
          <div class="fodds">×1.8</div>
          <div class="fmystery">??? kg</div>
        </div>
        <div class="fcard" id="fc1" onclick="pickBall(1)">
          <canvas id="prev1" width="70" height="80"></canvas>
          <div class="fname" id="fn1">—</div>
          <div class="fodds">×1.8</div>
          <div class="fmystery">??? kg</div>
        </div>
      </div>
    </div>
    <div class="card" id="betCard">
      <div class="clabel">🎰 Your Bet</div>
      <input class="bet-input" type="number" id="betAmtInput" min="1" value="10" placeholder="Amount...">
      <div class="bet-grid">
        <button class="qb" onclick="qbet(5)">$5</button>
        <button class="qb" onclick="qbet(10)">$10</button>
        <button class="qb" onclick="qbet(25)">$25</button>
        <button class="qb" onclick="qbet(50)">$50</button>
        <button class="qb" onclick="qbetHalf()">HALF</button>
        <button class="qb" onclick="qbetAll()">ALL IN</button>
      </div>
    </div>
    <div class="bet-live card" id="betLive">
      <div class="bet-live-label">💰 Your Bet</div>
      <div class="bet-live-amount" id="betLiveAmt">$0</div>
      <div class="bet-live-on" id="betLiveOn">on —</div>
    </div>
    <div class="result-msg" id="resMSG"></div>
    <button class="main-btn go" id="mainBtn" onclick="handleBtn()">CONFIRM BET</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── Telegram: expand to fullscreen immediately
if (window.Telegram && window.Telegram.WebApp) {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
  if (Telegram.WebApp.requestFullscreen) Telegram.WebApp.requestFullscreen();
}

// ══════════════════════════════════════════
//  DYNAMIC LAYOUT — fits any window size
// ══════════════════════════════════════════
function applyLayout() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const headerH = document.querySelector('.header').offsetHeight || 40;
  const availH = vh - headerH - 12;
  const pad = 12;

  let arenaSize, sidebarW;
  const wrap = document.querySelector('.game-wrap');
  const sidebar = document.querySelector('.sidebar');

  if (vw >= 580) {
    // Side by side
    sidebarW = Math.round(Math.max(190, Math.min(250, vw * 0.30)));
    arenaSize = Math.round(Math.min(vw - sidebarW - pad * 3, availH));
    wrap.style.cssText = `display:flex;flex-direction:row;align-items:flex-start;gap:8px;padding:0 6px 6px;width:100%;height:${availH}px;`;
    sidebar.style.cssText = `width:${sidebarW}px;max-height:${availH}px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;`;
  } else {
    // Stacked
    arenaSize = Math.round(Math.min(vw - pad, availH * 0.50));
    sidebarW = vw - pad;
    wrap.style.cssText = `display:flex;flex-direction:column;align-items:center;gap:6px;padding:0 6px 6px;width:100%;`;
    sidebar.style.cssText = `width:${sidebarW}px;max-height:${availH - arenaSize - 20}px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;`;
  }

  // Size canvas + arena frame
  const af = document.querySelector('.arena-frame');
  const cw = document.querySelector('.cdbar-wrap');
  af.style.width = arenaSize + 'px';
  af.style.height = arenaSize + 'px';
  cw.style.width = arenaSize + 'px';
  canvas.width = arenaSize;
  canvas.height = arenaSize;
  canvas.style.width = arenaSize + 'px';
  canvas.style.height = arenaSize + 'px';

  if (typeof renderer !== 'undefined') renderer.setSize(arenaSize, arenaSize);
  if (typeof camera !== 'undefined') { camera.aspect = 1; camera.updateProjectionMatrix(); }

  return arenaSize;
}

let W = Math.min(window.innerWidth - 16, 400);

const canvas = document.getElementById('threeCanvas');
canvas.width = W; canvas.height = W;
canvas.style.width = W + 'px'; canvas.style.height = W + 'px';
document.querySelector('.arena-frame').style.width = W + 'px';
document.querySelector('.arena-frame').style.height = W + 'px';
document.querySelector('.cdbar-wrap').style.width = W + 'px';
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setSize(W, W);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x1a1008, 1);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1008);
const camera = new THREE.PerspectiveCamera(48, 1, 0.1, 200);
camera.position.set(0, 15, 15);
camera.lookAt(0, 0, 0);

// Now safe to call applyLayout — renderer and camera both exist
applyLayout();

// Gentle camera orbit
let camAngle = 0;

// ── LIGHTS
const ambient = new THREE.AmbientLight(0xffeedd, 0.35);
scene.add(ambient);

const sunLight = new THREE.DirectionalLight(0xffe8c0, 0.75);
sunLight.position.set(5, 12, 8);
sunLight.castShadow = true;
sunLight.shadow.mapSize.set(1024, 1024);
sunLight.shadow.camera.near = 0.1;
sunLight.shadow.camera.far = 40;
sunLight.shadow.camera.left = -12;
sunLight.shadow.camera.right = 12;
sunLight.shadow.camera.top = 12;
sunLight.shadow.camera.bottom = -12;
scene.add(sunLight);

const rimLight = new THREE.DirectionalLight(0x334477, 0.20);
rimLight.position.set(-6, 4, -5);
scene.add(rimLight);

const fillLight = new THREE.PointLight(0xff8833, 0.30, 30);
fillLight.position.set(-3, 5, 3);
scene.add(fillLight);

// ══════════════════════════════════════════
//  ARENA (dohyo)
// ══════════════════════════════════════════
const ARENA_R3 = 7.2; // 3D arena radius

function makeArena() {
  const group = new THREE.Group();

  // Outer wood platform — raised octagonal base
  const woodGeo = new THREE.CylinderGeometry(ARENA_R3 + 1.4, ARENA_R3 + 1.8, 0.35, 8);
  const woodMat = new THREE.MeshPhongMaterial({ color: 0x3a2010, shininess: 15, specular: 0x221108 });
  const wood = new THREE.Mesh(woodGeo, woodMat);
  wood.receiveShadow = true;
  wood.position.y = -0.32;
  group.add(wood);

  // Wood plank lines on platform (8 segments)
  for (let i = 0; i < 8; i++) {
    const angle = (i / 8) * Math.PI * 2;
    const plankGeo = new THREE.BoxGeometry(0.06, 0.02, ARENA_R3 + 1.3);
    const plankMat = new THREE.MeshLambertMaterial({ color: i%2===0 ? 0x2a1808 : 0x4a2810 });
    const plank = new THREE.Mesh(plankGeo, plankMat);
    plank.position.set(Math.cos(angle)*2.5, -0.14, Math.sin(angle)*2.5);
    plank.rotation.y = angle;
    group.add(plank);
  }

  // Clay floor disc — darker ring
  const floorGeo = new THREE.CylinderGeometry(ARENA_R3 + 0.05, ARENA_R3 + 0.1, 0.32, 64);
  const floorMat = new THREE.MeshPhongMaterial({ color: 0x7a4018, shininess: 5 });
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.receiveShadow = true;
  floor.position.y = -0.01;
  group.add(floor);

  // Clay surface — main fighting area
  const surfaceGeo = new THREE.CylinderGeometry(ARENA_R3, ARENA_R3, 0.32, 64);
  const surfaceMat = new THREE.MeshPhongMaterial({ color: 0xc07838, shininess: 4, specular: 0x331a08 });
  const surface = new THREE.Mesh(surfaceGeo, surfaceMat);
  surface.receiveShadow = true;
  surface.position.y = 0;
  group.add(surface);

  // Radial clay texture lines (like raked sand)
  for (let i = 0; i < 12; i++) {
    const angle = (i / 12) * Math.PI * 2;
    const lineGeo = new THREE.BoxGeometry(0.04, 0.02, ARENA_R3 * 0.9);
    const lineMat = new THREE.MeshLambertMaterial({ color: 0xa86828, transparent: true, opacity: 0.5 });
    const line = new THREE.Mesh(lineGeo, lineMat);
    line.position.set(0, 0.17, 0);
    line.rotation.y = angle;
    group.add(line);
  }

  // Inner circle — white painted ring
  const innerRingGeo = new THREE.TorusGeometry(ARENA_R3 * 0.55, 0.07, 6, 48);
  const innerRingMat = new THREE.MeshLambertMaterial({ color: 0xeeddcc, transparent: true, opacity: 0.6 });
  const innerRing = new THREE.Mesh(innerRingGeo, innerRingMat);
  innerRing.rotation.x = Math.PI / 2;
  innerRing.position.y = 0.17;
  group.add(innerRing);

  // Shikiri lines — two parallel black bars
  for (let s of [-1, 1]) {
    const lineGeo = new THREE.BoxGeometry(0.14, 0.025, 1.6);
    const lineMat = new THREE.MeshLambertMaterial({ color: 0x221100 });
    const line = new THREE.Mesh(lineGeo, lineMat);
    line.position.set(s * 1.1, 0.17, 0);
    group.add(line);
  }

  // Tawara (boundary rope) — torus, straw-colored
  const ropeGeo = new THREE.TorusGeometry(ARENA_R3, 0.26, 14, 80);
  const ropeMat = new THREE.MeshPhongMaterial({ color: 0xe8cc60, shininess: 8, specular: 0x665500 });
  const rope = new THREE.Mesh(ropeGeo, ropeMat);
  rope.rotation.x = Math.PI / 2;
  rope.position.y = 0.22;
  rope.castShadow = true;
  group.add(rope);

  // Rope twist detail — smaller torus on top
  const ropeTopGeo = new THREE.TorusGeometry(ARENA_R3, 0.10, 8, 80);
  const ropeTopMat = new THREE.MeshLambertMaterial({ color: 0xd4a830, transparent: true, opacity: 0.7 });
  const ropeTop = new THREE.Mesh(ropeTopGeo, ropeTopMat);
  ropeTop.rotation.x = Math.PI / 2;
  ropeTop.position.y = 0.40;
  group.add(ropeTop);

  return group;
}

const arenaGroup = makeArena();
scene.add(arenaGroup);

// ══════════════════════════════════════════
//  SUMO BALL CREATION
// ══════════════════════════════════════════
// Two distinct fighter palettes — assigned per round so thumbnails match
const FIGHTER_PALETTES = [
  { body: 0xf0c87a, dark: 0xc8904a, thong: 0xdd2222, thongName: 'Red' },   // Fighter 0: red thong
  { body: 0xe0d0b8, dark: 0xb8a888, thong: 0x2244cc, thongName: 'Blue' },  // Fighter 1: blue thong
];
// Extra body skin variety (random each round)
const BODY_SKINS = [
  { body: 0xf0c87a, dark: 0xc8904a },
  { body: 0xe8b878, dark: 0xc09050 },
  { body: 0xd4a870, dark: 0xa87840 },
  { body: 0xf4dca8, dark: 0xd0a868 },
  { body: 0xc88858, dark: 0xa06030 },
];
const NAMES = ['Yokozuna','Takashi','Gonzo','Blobby','Tsunami','Meatball','Buddha','Thunder','Donut','Crusher','Fatso','Kabuki'];

// facingAngle: the Y rotation so the face points toward opponent
// side 0 = left ball, faces right (+Z in world = +X in 2D)
// side 1 = right ball, faces left
function makeBallMesh(palette, radius) {
  const group = new THREE.Group();

  // ── BODY sphere
  const bodyGeo = new THREE.SphereGeometry(radius, 32, 32);
  const bodyMat = new THREE.MeshPhongMaterial({
    color: palette.body,
    specular: 0x886644,
    shininess: 25,
    emissive: new THREE.Color(palette.body).multiplyScalar(0.04),
  });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.castShadow = true;
  body.receiveShadow = true;
  group.add(body);

  // ── THONG (mawashi) — bold colored band sitting ON the sphere
  const thongMat = new THREE.MeshPhongMaterial({ color: palette.thong, shininess: 25, specular: 0x443322 });

  // The waist band sits at y = -0.3*R on the sphere
  // At that height, the ring radius = sqrt(R² - (0.3R)²) = 0.954*R
  // Tube thickness = 0.18*R so it's clearly visible
  const bandY = -radius * 0.30;
  const bandRingR = radius * 0.954;
  const bandGeo = new THREE.TorusGeometry(bandRingR, radius * 0.18, 12, 48);
  const band = new THREE.Mesh(bandGeo, thongMat);
  band.rotation.x = Math.PI / 2;
  band.position.y = bandY;
  band.castShadow = true;
  group.add(band);

  // Front flap — wide cloth panel hanging below the band
  const flapGeo = new THREE.BoxGeometry(radius * 0.45, radius * 0.55, radius * 0.16);
  const flap = new THREE.Mesh(flapGeo, thongMat);
  // Position it just below center, in front of sphere (+Z in local space before rotation)
  flap.position.set(0, -radius * 0.75, radius * 0.52);
  flap.castShadow = true;
  group.add(flap);

  // Flap rounded bottom
  const flapCapGeo = new THREE.CylinderGeometry(radius*0.225, radius*0.225, radius*0.16, 12);
  const flapCap = new THREE.Mesh(flapCapGeo, thongMat);
  flapCap.position.set(0, -radius*1.03, radius*0.50);
  flapCap.rotation.x = Math.PI/2;
  group.add(flapCap);

  // Back knot — big visible lump
  const knotGeo = new THREE.SphereGeometry(radius * 0.24, 10, 8);
  const knotBack = new THREE.Mesh(knotGeo, thongMat);
  knotBack.position.set(0, -radius * 0.28, -radius * 0.92);
  knotBack.scale.set(1.6, 0.85, 0.85);
  knotBack.castShadow = true;
  group.add(knotBack);

  // ── FACE — angry forward-facing expression
  // Eyes (wide, angry)
  const eyeGeo = new THREE.SphereGeometry(radius * 0.10, 10, 10);
  const eyeMat = new THREE.MeshPhongMaterial({ color: 0x111100, shininess: 90, specular: 0xffffff });
  const eyeWhiteGeo = new THREE.SphereGeometry(radius * 0.13, 10, 10);
  const eyeWhiteMat = new THREE.MeshPhongMaterial({ color: 0xffffee, shininess: 20 });

  [-1, 1].forEach(side => {
    // White
    const ew = new THREE.Mesh(eyeWhiteGeo, eyeWhiteMat);
    ew.position.set(side * radius * 0.27, radius * 0.22, radius * 0.88);
    ew.scale.set(1, 0.85, 0.7);
    group.add(ew);
    // Pupil
    const eye = new THREE.Mesh(eyeGeo, eyeMat);
    eye.position.set(side * radius * 0.27, radius * 0.22, radius * 0.95);
    group.add(eye);
    // Glint
    const glintGeo = new THREE.SphereGeometry(radius * 0.036, 6, 6);
    const glint = new THREE.Mesh(glintGeo, new THREE.MeshBasicMaterial({ color: 0xffffff }));
    glint.position.set(side * radius * 0.25, radius * 0.25, radius * 1.00);
    group.add(glint);
  });

  // Angry V-brows
  [-1, 1].forEach(side => {
    const browGeo = new THREE.BoxGeometry(radius * 0.28, radius * 0.06, radius * 0.06);
    const browMat = new THREE.MeshLambertMaterial({ color: 0x220800 });
    const brow = new THREE.Mesh(browGeo, browMat);
    brow.position.set(side * radius * 0.27, radius * 0.38, radius * 0.88);
    brow.rotation.z = side * -0.55; // angry inward slant
    group.add(brow);
  });

  // Nose — big round
  const noseGeo = new THREE.SphereGeometry(radius * 0.10, 10, 10);
  const noseMat = new THREE.MeshPhongMaterial({ color: palette.dark, shininess: 30 });
  const nose = new THREE.Mesh(noseGeo, noseMat);
  nose.position.set(0, radius * 0.10, radius * 0.97);
  nose.scale.set(1, 0.8, 0.7);
  group.add(nose);

  // Gritted teeth / grimace mouth
  const mouthGeo = new THREE.BoxGeometry(radius * 0.38, radius * 0.07, radius * 0.05);
  const mouthMat = new THREE.MeshLambertMaterial({ color: 0x220800 });
  const mouth = new THREE.Mesh(mouthGeo, mouthMat);
  mouth.position.set(0, -radius * 0.06, radius * 0.97);
  group.add(mouth);

  // Teeth row
  for (let t = -1; t <= 1; t++) {
    const toothGeo = new THREE.BoxGeometry(radius * 0.09, radius * 0.08, radius * 0.04);
    const toothMat = new THREE.MeshLambertMaterial({ color: 0xffffd8 });
    const tooth = new THREE.Mesh(toothGeo, toothMat);
    tooth.position.set(t * radius * 0.12, -radius * 0.04, radius * 0.98);
    group.add(tooth);
  }

  // Cheek blush
  [-1, 1].forEach(side => {
    const blushGeo = new THREE.SphereGeometry(radius * 0.10, 8, 8);
    const blushMat = new THREE.MeshBasicMaterial({ color: 0xff9966, transparent: true, opacity: 0.35 });
    const blush = new THREE.Mesh(blushGeo, blushMat);
    blush.position.set(side * radius * 0.44, radius * 0.08, radius * 0.87);
    blush.scale.set(1, 0.6, 0.5);
    group.add(blush);
  });

  // ── TOPKNOT (hair bun on top)
  const bunGeo = new THREE.SphereGeometry(radius * 0.22, 10, 10);
  const bunMat = new THREE.MeshLambertMaterial({ color: 0x110800 });
  const bun = new THREE.Mesh(bunGeo, bunMat);
  bun.position.set(0, radius * 1.05, 0);
  bun.scale.set(0.7, 0.55, 0.7);
  group.add(bun);

  // Bun strap
  const strapGeo = new THREE.TorusGeometry(radius * 0.13, radius * 0.04, 6, 20);
  const strapMat = new THREE.MeshLambertMaterial({ color: palette.thong });
  const strap = new THREE.Mesh(strapGeo, strapMat);
  strap.position.set(0, radius * 1.02, 0);
  strap.rotation.x = Math.PI / 2;
  group.add(strap);

  return group;
}

// ══════════════════════════════════════════
//  PARTICLES (dust/impact)
// ══════════════════════════════════════════
const particles = [];

function spawnParticles(x, z, count, color) {
  for (let i = 0; i < count; i++) {
    const geo = new THREE.SphereGeometry(0.06 + Math.random() * 0.08, 4, 4);
    const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.8 });
    const p = new THREE.Mesh(geo, mat);
    p.position.set(x + (Math.random()-.5)*0.5, 0.3, z + (Math.random()-.5)*0.5);
    const angle = Math.random() * Math.PI * 2;
    const speed = 0.04 + Math.random() * 0.08;
    p.userData = {
      vx: Math.cos(angle) * speed,
      vy: 0.06 + Math.random() * 0.06,
      vz: Math.sin(angle) * speed,
      life: 1.0,
      decay: 0.025 + Math.random() * 0.02
    };
    scene.add(p);
    particles.push(p);
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    const d = p.userData;
    d.life -= d.decay;
    d.vy -= 0.004; // gravity
    p.position.x += d.vx;
    p.position.y += d.vy;
    p.position.z += d.vz;
    p.material.opacity = d.life * 0.8;
    if (d.life <= 0) {
      scene.remove(p);
      particles.splice(i, 1);
    }
  }
}

// ══════════════════════════════════════════
//  SCREEN SHAKE
// ══════════════════════════════════════════
let shakeIntensity = 0;
let shakeDecay = 0.85;

function triggerShake(intensity) {
  shakeIntensity = Math.max(shakeIntensity, intensity);
}

function updateCamera() {
  camAngle += 0.0015;
  const r = 15.2;
  camera.position.x = Math.sin(camAngle) * r;
  camera.position.z = Math.cos(camAngle) * r;
  camera.position.y = 15;
  camera.lookAt(0, 0, 0);
}

function updateShake() {
  if (shakeIntensity > 0.001) {
    camera.position.x += (Math.random() - 0.5) * shakeIntensity;
    camera.position.y += (Math.random() - 0.5) * shakeIntensity * 0.5;
    shakeIntensity *= shakeDecay;
  } else {
    shakeIntensity = 0;
  }
}

// ══════════════════════════════════════════
//  IMPACT RING (shockwave)
// ══════════════════════════════════════════
const impactRings = [];

function spawnImpactRing(x, z) {
  const geo = new THREE.TorusGeometry(0.3, 0.06, 6, 24);
  const mat = new THREE.MeshBasicMaterial({ color: 0xffe066, transparent: true, opacity: 0.9 });
  const ring = new THREE.Mesh(geo, mat);
  ring.position.set(x, 0.25, z);
  ring.rotation.x = Math.PI / 2;
  ring.userData = { life: 1.0 };
  scene.add(ring);
  impactRings.push(ring);
}

function updateImpactRings() {
  for (let i = impactRings.length - 1; i >= 0; i--) {
    const r = impactRings[i];
    r.userData.life -= 0.045;
    const s = 1 + (1 - r.userData.life) * 4;
    r.scale.set(s, s, s);
    r.material.opacity = r.userData.life * 0.8;
    if (r.userData.life <= 0) {
      scene.remove(r);
      impactRings.splice(i, 1);
    }
  }
}

// ══════════════════════════════════════════
//  BALL STATE + PREVIEW
// ══════════════════════════════════════════
// Convert 2D canvas coords (0–360) to 3D world coords
const CANVAS_R = 155;
function c2w(cx, cy) {
  return {
    x: ((cx - 180) / CANVAS_R) * ARENA_R3,
    z: ((cy - 180) / CANVAS_R) * ARENA_R3
  };
}
function r2w(r) { return (r / CANVAS_R) * ARENA_R3; }

let ballMeshes = [null, null];
let ballState = []; // the 2D physics objects (x,y in canvas space)
let lastColliding = false;

function createBallMeshes() {
  ballMeshes.forEach(m => { if (m) scene.remove(m); });
  ballState.forEach((b, i) => {
    // Pick a random body skin but keep the assigned thong color
    const skin = BODY_SKINS[Math.floor(Math.random() * BODY_SKINS.length)];
    const palette = { ...skin, thong: FIGHTER_PALETTES[i].thong, dark: skin.dark };
    b.palette = palette;
    const radius = r2w(b.r);
    b.radius3 = radius;
    // Ball 0 is on the left → face right (+X direction) = rotY = PI/2
    // Ball 1 is on the right → face left (-X direction) = rotY = -PI/2
    const facingAngle = i === 0 ? Math.PI / 2 : -Math.PI / 2;
    const mesh = makeBallMesh(palette, radius, 0); // build with no pre-rotation
    mesh.quaternion.setFromEuler(new THREE.Euler(0, facingAngle, 0));
    const pos = c2w(b.x, b.y);
    mesh.position.set(pos.x, radius, pos.z);
    scene.add(mesh);
    ballMeshes[i] = mesh;
  });
}

function updateBallMeshes() {
  ballState.forEach((b, i) => {
    const mesh = ballMeshes[i];
    if (!mesh) return;
    const pos = c2w(b.x, b.y);
    mesh.position.x = pos.x;
    mesh.position.z = pos.z;
    mesh.position.y = b.radius3;

    const speed = Math.hypot(b.vx, b.vy);
    if (speed > 0.05) {
      // In 3D: vx→X, vy→Z. Roll axis is perpendicular to movement, in XZ plane.
      // If moving in direction (mx, mz), roll axis is (mz, 0, -mx)
      const mx = b.vx / speed;
      const mz = b.vy / speed;
      const angle = speed * 0.55 / b.r;
      const axis = new THREE.Vector3(mz, 0, -mx); // perpendicular to movement
      const dq = new THREE.Quaternion().setFromAxisAngle(axis, angle);
      mesh.quaternion.premultiply(dq);
    }
  });
}

// ══════════════════════════════════════════
//  GAME LOGIC (2D physics — unchanged)
// ══════════════════════════════════════════
const CX2 = 180, CY2 = 180, ARENA_R2 = 155;
const PAYOUT = 1.8;

let bankroll=100, round=1, phase='betting';
let picked=-1, betAmt=0, winner=-1;
let fStart=null, lastTs=null, matchTime=0;
let raf=null, cdInt=null, history=[];
let weightShiftTimer=0, nextWeightShift=1.5;

function makeBalls() {
  const heavyMass = 3000 + Math.random() * 1800;
  const lightMass  = heavyMass / (1.8 + Math.random() * 1.2);
  const masses = Math.random() < 0.5 ? [heavyMass, lightMass] : [lightMass, heavyMass];
  ballState = masses.map((mass, side) => {
    const visR = 34 + Math.random() * 20;
    const dir  = side === 0 ? 1 : -1;
    const skin = BODY_SKINS[Math.floor(Math.random() * BODY_SKINS.length)];
    const palette = { ...skin, thong: FIGHTER_PALETTES[side].thong };
    return {
      x: CX2 + dir * (-(visR + 22)),
      y: CY2 + (Math.random() - 0.5) * 40,
      vx: 0, vy: 0,
      r: visR, mass,
      effMass: mass,
      name: NAMES[Math.floor(Math.random() * NAMES.length)],
      side,
      palette
    };
  });
}

// Weight shift system
function decideFight() {
  weightShiftTimer = 0;
  nextWeightShift  = 1 + Math.random() * 2;
  ballState[0].effMass = ballState[0].mass;
  ballState[1].effMass = ballState[1].mass;
}

function physics() {
  matchTime += 1/60;
  weightShiftTimer += 1/60;
  const [a, b] = ballState;

  if (weightShiftTimer >= nextWeightShift) {
    weightShiftTimer = 0;
    nextWeightShift  = 1 + Math.random() * 2;
    const t     = Math.min(1, matchTime / 20);
    const delta = (500 + t * 3000) * (Math.random() * 2 - 1);
    a.effMass = Math.max(400, Math.min(6000, a.mass + delta));
    b.effMass = Math.max(400, Math.min(6000, b.mass - delta));
  }

  [a, b].forEach(bl => {
    const opp = bl === a ? b : a;
    const toX = opp.x-bl.x, toY = opp.y-bl.y;
    const toD = Math.hypot(toX,toY)||1;
    const tnx=toX/toD, tny=toY/toD;
    const pnx=-tny, pny=tnx;
    const toCX=CX2-bl.x, toCY=CY2-bl.y;
    const toCd=Math.hypot(toCX,toCY)||1;
    const cnx=toCX/toCd, cny=toCY/toCd;

    const effH=Math.min(1,Math.max(0,(bl.effMass-400)/5600));
    const effL=1-effH;
    const myDist=Math.hypot(bl.x-CX2,bl.y-CY2);
    const danger=Math.max(0,(myDist-ARENA_R2*.45)/(ARENA_R2*.55));
    const dangerSpeed=1+danger*1.8;

    if(danger>0.15){
      const escStr=danger*danger*5.0*dangerSpeed;
      bl.vx+=cnx*escStr*0.13; bl.vy+=cny*escStr*0.13;
      if(Math.random()<0.09+danger*0.12){
        const sd=Math.random()<.5?1:-1;
        bl.vx+=pnx*sd*danger*4.0*dangerSpeed*0.13;
        bl.vy+=pny*sd*danger*4.0*dangerSpeed*0.13;
      }
    }
    const chargeStr=(1.8+effH*3.0)*dangerSpeed;
    bl.vx+=tnx*chargeStr*0.065; bl.vy+=tny*chargeStr*0.065;

    if(Math.random()<0.05+effL*0.08){
      const sd=Math.random()<.5?1:-1;
      bl.vx+=pnx*sd*(1.2+effL*2.5)*dangerSpeed*0.09;
      bl.vy+=pny*sd*(1.2+effL*2.5)*dangerSpeed*0.09;
    }
    if(Math.random()<0.018){
      bl.vx+=tnx*(3.0+effH*4.0)*dangerSpeed*0.14;
      bl.vy+=tny*(3.0+effH*4.0)*dangerSpeed*0.14;
    }

    bl.vx*=(0.92-effH*0.02); bl.vy*=(0.92-effH*0.02);
    const cap=(5+effL*4)*Math.sqrt(dangerSpeed);
    const sp=Math.hypot(bl.vx,bl.vy);
    if(sp>cap){bl.vx=bl.vx/sp*cap;bl.vy=bl.vy/sp*cap;}
    bl.x+=bl.vx; bl.y+=bl.vy;
  });

  // Collision
  const dx=b.x-a.x, dy=b.y-a.y;
  const d=Math.hypot(dx,dy), minD=a.r+b.r;
  if(d<minD&&d>0.1){
    const nx=dx/d,ny=dy/d,tm=a.effMass+b.effMass;
    a.x-=nx*(minD-d)*(b.effMass/tm); a.y-=ny*(minD-d)*(b.effMass/tm);
    b.x+=nx*(minD-d)*(a.effMass/tm); b.y+=ny*(minD-d)*(a.effMass/tm);
    const aVn=a.vx*nx+a.vy*ny, bVn=b.vx*nx+b.vy*ny, rel=aVn-bVn;
    if(rel>0){
      const e=Math.min(0.25,0.06+Math.abs(rel)*0.05);
      const j=(1+e)*rel/(1/a.effMass+1/b.effMass);
      a.vx-=j/a.effMass*nx; a.vy-=j/a.effMass*ny;
      b.vx+=j/b.effMass*nx; b.vy+=j/b.effMass*ny;

      // Impact effects
      const impactForce = Math.abs(rel);
      if (impactForce > 0.5) {
        const midX = (a.x+b.x)/2, midY = (a.y+b.y)/2;
        const w3 = c2w(midX, midY);
        const shakeAmt = Math.min(0.35, impactForce * 0.12);
        triggerShake(shakeAmt);
        if (impactForce > 1.0) {
          spawnImpactRing(w3.x, w3.z);
          spawnParticles(w3.x, w3.z, Math.floor(impactForce * 4), 0xc8a060);
        }
      }
    }
    const tx=-ny,ty=nx;
    a.vx-=tx*(a.vx*tx+a.vy*ty)*0.22; a.vy-=ty*(a.vx*tx+a.vy*ty)*0.22;
    b.vx-=tx*(b.vx*tx+b.vy*ty)*0.22; b.vy-=ty*(b.vx*tx+b.vy*ty)*0.22;
  }
}

function checkWin(){
  for(let i=0;i<2;i++){
    if(Math.hypot(ballState[i].x-CX2,ballState[i].y-CY2)>ARENA_R2) return i===0?1:0;
  }
  return -1;
}

// ══════════════════════════════════════════
//  MAIN RENDER LOOP
// ══════════════════════════════════════════
function fightLoop(ts) {
  if(!fStart){fStart=ts;lastTs=ts;matchTime=0;}
  lastTs=ts;

  physics();

  // 20s hard timeout
  if(matchTime>=20){
    const d0=Math.hypot(ballState[0].x-CX2,ballState[0].y-CY2);
    const d1=Math.hypot(ballState[1].x-CX2,ballState[1].y-CY2);
    const loser=d0>=d1?0:1;
    const nx=(ballState[loser].x-CX2)/(Math.hypot(ballState[loser].x-CX2,ballState[loser].y-CY2)||1);
    const ny=(ballState[loser].y-CY2)/(Math.hypot(ballState[loser].x-CX2,ballState[loser].y-CY2)||1);
    ballState[loser].x=CX2+nx*(ARENA_R2+1);
    ballState[loser].y=CY2+ny*(ARENA_R2+1);
  }

  const w=checkWin();
  if(w!==-1){winner=w;endFight();return;}

  updateBallMeshes();
  updateParticles();
  updateImpactRings();
  updateCamera();
  updateShake();

  renderer.render(scene, camera);
  raf=requestAnimationFrame(fightLoop);
}

function idleLoop() {
  updateParticles();
  updateImpactRings();
  updateBallMeshes();
  updateCamera();
  renderer.render(scene, camera);
  raf = requestAnimationFrame(idleLoop);
}

function endFight(){
  // Loser gets knocked away visually
  const loserIdx = winner === 0 ? 1 : 0;
  const loserMesh = ballMeshes[loserIdx];
  if (loserMesh) {
    loserMesh.material && (loserMesh.traverse(c => {
      if (c.isMesh && c.material) c.material.opacity = 0.3;
    }));
  }
  triggerShake(0.5);
  spawnParticles(
    c2w(ballState[loserIdx].x, ballState[loserIdx].y).x,
    c2w(ballState[loserIdx].x, ballState[loserIdx].y).z,
    18, 0xffe088
  );
  phase='result';
  resolveRound();
  raf = requestAnimationFrame(idleLoop);
}

// ══════════════════════════════════════════
//  GAME FLOW
// ══════════════════════════════════════════
function startRound(){
  phase='betting'; picked=-1; winner=-1; fStart=null; lastTs=null; matchTime=0;
  weightShiftTimer=0; nextWeightShift=1+Math.random()*2;

  makeBalls();
  createBallMeshes();

  document.getElementById('roundNum').textContent=round;
  document.getElementById('bankroll').textContent='$'+bankroll;
  ballState.forEach((b,i)=>{
    renderPreview(i);
    const thongColors = ['#dd2222','#2244cc'];
    const thongNames = ['🔴 Red','🔵 Blue'];
    document.getElementById('fn'+i).innerHTML = `${b.name}<br><span style="font-size:.65rem;color:${thongColors[i]}">${thongNames[i]}</span>`;
    const fc = document.getElementById('fc'+i);
    fc.classList.remove('picked','locked-winner','locked-loser');
    fc.style.borderColor = '';
    fc.style.boxShadow = '';
  });

  setPill('bet'); setBtn('go','CONFIRM BET'); btnEnable(true);
  document.getElementById('betCard').style.display = 'block';
  document.getElementById('betLive').style.display = 'none';
  document.getElementById('resMSG').textContent = '';
  document.getElementById('resMSG').className = 'result-msg';

  if(raf) cancelAnimationFrame(raf);
  raf = requestAnimationFrame(idleLoop);

  startCountdown(9,()=>{ if(phase==='betting') startFight(); });
}

function pickBall(i){
  if(phase!=='betting')return;
  picked=i;
  for (let j = 0; j < 2; j++) {
    const fc = document.getElementById('fc'+j);
    fc.classList.toggle('picked', j===i);
    fc.style.borderColor = '';
    fc.style.boxShadow = '';
  }
}

function handleBtn(){ if(phase==='betting')confirmBet(); else if(phase==='result')nextRound(); }

function confirmBet(){
  const v=parseFloat(document.getElementById('betAmtInput').value);
  if(!v||v<=0)return flashBtn('Enter amount!');
  if(v>bankroll)return flashBtn('Not enough $!');
  if(picked===-1)return flashBtn('Pick a fighter!');
  betAmt=Math.floor(v);
  clearInterval(cdInt);
  document.getElementById('cdBar').style.transition='none';
  document.getElementById('cdBar').style.width='0%';
  startFight();
}

function startFight(){
  decideFight();
  phase='fighting'; setPill('fight');
  document.getElementById('betCard').style.display='none';
  // Show live bet strip
  const liveName = picked !== -1 ? ballState[picked].name : '—';
  const thongColors = ['#dd2222','#2244cc'];
  const thongNames = ['🔴 Red','🔵 Blue'];
  document.getElementById('betLiveAmt').textContent = betAmt > 0 ? '$'+betAmt : 'No bet';
  document.getElementById('betLiveOn').textContent = picked !== -1
    ? `on ${liveName} (${thongNames[picked]})`
    : '';
  document.getElementById('betLive').style.display = 'block';
  // Dim the loser card, keep picked card bright
  for (let i = 0; i < 2; i++) {
    const fc = document.getElementById('fc'+i);
    fc.classList.remove('picked');
    if (i === picked) {
      fc.classList.add('picked','locked-winner');
    } else {
      fc.classList.add('locked-loser');
    }
  }
  btnEnable(false);
  if(raf) cancelAnimationFrame(raf);
  raf=requestAnimationFrame(fightLoop);
}

function resolveRound(){
  const didBet=picked!==-1&&betAmt>0, won=picked===winner;
  if(didBet){
    if(won){
      const profit=Math.floor(betAmt*PAYOUT);
      bankroll=bankroll-betAmt+profit;
      setMsg(`🎉 +$${profit-betAmt} WIN!`,'r-win'); setPill('win');
    } else {
      bankroll-=betAmt;
      setMsg(`💀 -$${betAmt} LOSS`,'r-lose'); setPill('lose');
    }
  } else { setMsg('No bet placed','r-skip'); setPill('none'); }

  history.push(didBet?(won?'w':'l'):'s');
  renderHistory();
  document.getElementById('bankroll').textContent='$'+bankroll;
  betAmt=0;

  if(bankroll<=0){
    setBtn('next','GAME OVER — RESTART'); btnEnable(true);
    document.getElementById('mainBtn').onclick=restartGame; return;
  }
  setBtn('next','NEXT ROUND →'); btnEnable(true);
}

function nextRound(){ round++; document.getElementById('mainBtn').onclick=handleBtn; startRound(); }
function restartGame(){ bankroll=100;round=1;history=[]; renderHistory(); document.getElementById('mainBtn').onclick=handleBtn; startRound(); }
function renderHistory(){
  document.getElementById('histDots').innerHTML=history.slice(-14).map(h=>`<div class="hdot" style="background:${h==='w'?'#2ecc8a':h==='l'?'#e03030':'#3a3020'}"></div>`).join('');
}

// ── countdown
function startCountdown(sec,onDone){
  const bar=document.getElementById('cdBar');
  bar.style.transition='none'; bar.style.width='100%'; bar.style.background='var(--gold)';
  setTimeout(()=>{bar.style.transition=`width ${sec}s linear`;bar.style.width='0%';},40);
  let left=sec;
  cdInt=setInterval(()=>{
    left--;
    if(left<=3)bar.style.background='var(--red)';
    if(left<=0){clearInterval(cdInt);onDone();}
  },1000);
}

// UI helpers
function setPill(t){
  const m={bet:['pill-bet','💰 Place Your Bet'],fight:['pill-fight','⚡ FIGHT!'],win:['pill-win','🏆 YOU WIN!'],lose:['pill-lose','😭 YOU LOSE'],none:['pill-none','— Round Over']};
  const el=document.getElementById('pill'); el.className='phase-pill '+m[t][0]; el.textContent=m[t][1];
}
function setBtn(c,t){ const b=document.getElementById('mainBtn'); b.className='main-btn '+c; b.textContent=t; }
function btnEnable(v){ document.getElementById('mainBtn').disabled=!v; }
function setMsg(t,c){ const e=document.getElementById('resMSG'); e.textContent=t; e.className='result-msg '+c; }
function flashBtn(msg){
  const b=document.getElementById('mainBtn'),o=b.textContent;
  b.textContent=msg; b.style.background='#8a1010';
  setTimeout(()=>{b.textContent=o;b.style.background='';},1300);
}
function qbet(v){ document.getElementById('betAmtInput').value=Math.min(v,bankroll); }
function qbetHalf(){ document.getElementById('betAmtInput').value=Math.max(1,Math.floor(bankroll/2)); }
function qbetAll(){ document.getElementById('betAmtInput').value=bankroll; }
